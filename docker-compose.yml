version: "3.9"

services:
  next-app:
    build: .
    container_name: next_mvc_app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - MONGODB_URI=mongodb://mongo:27017/finance_app
      - JWT_SECRET=super_secret_jwt_key
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
